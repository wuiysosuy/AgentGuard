<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgentGuard - Command Control</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080b11;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --accent-primary: #6366f1; /* Indigo */
            --accent-primary-glow: rgba(99, 102, 241, 0.3);
            --accent-success: #10b981; /* Emerald */
            --accent-success-glow: rgba(16, 185, 129, 0.2);
            --accent-danger: #ef4444; /* Rose */
            --accent-danger-glow: rgba(239, 68, 68, 0.2);
            --accent-info: #06b6d4; /* Cyan */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 40%);
            background-attachment: fixed;
        }

        header {
            padding: 20px 16px;
            backdrop-filter: blur(12px);
            background: rgba(8, 11, 17, 0.8);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-info));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--accent-primary-glow);
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-danger);
            box-shadow: 0 0 8px var(--accent-danger);
        }

        .status-dot.connected {
            background-color: var(--accent-success);
            box-shadow: 0 0 8px var(--accent-success);
            animation: pulse 2s infinite;
        }

        main {
            flex: 1;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 12px var(--accent-primary-glow);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f3f4f6;
        }

        /* Card styles */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        /* Pulse highlight for pending requests */
        .card.pending {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
            animation: borderPulse 2s infinite ease-in-out;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .client-tag {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-radius: 6px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .time-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .command-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #6ee7b7;
            word-break: break-all;
            margin-bottom: 16px;
            max-height: 150px;
            overflow-y: auto;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-approve {
            background: var(--accent-success);
            color: white;
            box-shadow: 0 4px 14px var(--accent-success-glow);
        }

        .btn-approve:hover {
            background: #059669;
        }

        .btn-reject {
            background: var(--accent-danger);
            color: white;
            box-shadow: 0 4px 14px var(--accent-danger-glow);
        }

        .btn-reject:hover {
            background: #dc2626;
        }

        /* History items */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-card {
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-cmd {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #d1d5db;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-approved {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-rejected {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-auto {
            background: rgba(6, 182, 212, 0.15);
            color: #22d3ee;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        /* Settings View */
        .settings-group {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .setting-label {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .setting-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 34px;
            border: 1px solid var(--card-border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-primary);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* Whitelist management */
        .whitelist-input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .input-text {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .input-text:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .btn-add {
            background: var(--accent-primary);
            color: white;
            padding: 0 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .whitelist-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
        }

        .whitelist-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'Courier New', Courier, monospace;
        }

        .tag-remove {
            cursor: pointer;
            color: var(--accent-danger);
            font-weight: bold;
            font-size: 0.95rem;
            display: inline-block;
            line-height: 1;
        }

        /* Animations */
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        @keyframes borderPulse {
            0%, 100% {
                border-color: rgba(99, 102, 241, 0.4);
            }
            50% {
                border-color: rgba(99, 102, 241, 1);
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            fill: var(--card-border);
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>AgentGuard</h1>
        </div>
        <div class="status-badge">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">Đang kết nối...</span>
        </div>
    </header>

    <main>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">Bảng Điều Khiển</button>
            <button class="tab-btn" onclick="switchTab('settings')">Cấu Hình</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboardTab" class="tab-content active">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Yêu Cầu Chờ Phê Duyệt
            </h2>
            
            <div id="pendingContainer">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <polyline points="22 4 12 14.01 9 11.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p>Hiện không có yêu cầu nào đang chờ phê duyệt.</p>
                </div>
            </div>

            <h2 style="margin-top: 24px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Lịch Sử Câu Lệnh
            </h2>
            <div id="historyList" class="history-list">
                <!-- Loaded dynamically -->
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settingsTab" class="tab-content">
            <div class="settings-group">
                <div class="setting-row">
                    <div>
                        <div class="setting-label">Tự Động Duyệt</div>
                        <div class="setting-desc">Tự động chạy các lệnh an toàn có trong danh sách</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="autoApproveToggle" onchange="updateSettings()">
                        <span class="slider"></span>
                    </label>
                </div>

                <h3 style="font-size: 0.9rem; margin-bottom: 12px; color: var(--text-muted);">
                    Danh sách lệnh tự động duyệt (Whitelist)
                </h3>
                
                <div class="whitelist-input-container">
                    <input type="text" id="whitelistInput" class="input-text" placeholder="Ví dụ: git status, ls...">
                    <button class="btn-add" onclick="addWhitelistItem()">Thêm</button>
                </div>

                <div id="whitelistTags" class="whitelist-tags">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentRequests = [];
        let whitelist = [];
        let autoApproveEnabled = true;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            fetchRequests();
            fetchSettings();
            initSSE();
        });

        // Tab switcher
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            const event = window.event;
            if (event) {
                event.target.classList.add('active');
            } else {
                // Failback
                if (tabId === 'dashboard') {
                    document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                } else {
                    document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                }
            }
            document.getElementById(tabId + 'Tab').classList.add('active');
        }

        // Initialize Server-Sent Events for real-time updates
        function initSSE() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            const eventSource = new EventSource('/api/stream');

            eventSource.onopen = () => {
                statusDot.className = 'status-dot connected';
                statusText.innerText = 'Đã kết nối';
            };

            eventSource.onerror = (e) => {
                statusDot.className = 'status-dot';
                statusText.innerText = 'Mất kết nối';
                console.error("SSE Connection failed, retrying...", e);
            };

            eventSource.onmessage = (event) => {
                const payload = JSON.parse(event.data);
                if (payload.type === 'new_request' || payload.type === 'status_update') {
                    // Refetch data
                    fetchRequests();
                    
                    // Simple device haptic vibration if supported (needs user interaction context, but doesn't hurt)
                    if (navigator.vibrate) {
                        navigator.vibrate([100, 50, 100]);
                    }
                }
            };
        }

        // Fetch command requests
        function fetchRequests() {
            fetch('/api/requests')
                .then(res => res.json())
                .then(data => {
                    currentRequests = data;
                    renderDashboard();
                })
                .catch(err => console.error("Error fetching requests:", err));
        }

        // Render dashboard (pending and history)
        function renderDashboard() {
            const pendingContainer = document.getElementById('pendingContainer');
            const historyList = document.getElementById('historyList');
            
            const pending = currentRequests.filter(r => r.status === 'pending');
            const completed = currentRequests.filter(r => r.status !== 'pending');

            // Render pending
            if (pending.length === 0) {
                pendingContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="22 4 12 14.01 9 11.01" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <p>Hiện không có yêu cầu nào đang chờ phê duyệt.</p>
                    </div>`;
            } else {
                pendingContainer.innerHTML = pending.map(req => `
                    <div class="card pending" id="req-card-${req.id}">
                        <div class="request-header">
                            <span class="client-tag">${escapeHtml(req.client)}</span>
                            <span class="time-tag">${req.timestamp}</span>
                        </div>
                        <div class="command-box">$ ${escapeHtml(req.command)}</div>
                        <div class="action-buttons">
                            <button class="btn btn-reject" onclick="decide('${req.id}', 'reject')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                                Từ Chối
                            </button>
                            <button class="btn btn-approve" onclick="decide('${req.id}', 'approve')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                Phê Duyệt
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            // Render history
            if (completed.length === 0) {
                historyList.innerHTML = `<div class="empty-state" style="padding: 20px;"><p>Không có lịch sử câu lệnh.</p></div>`;
            } else {
                historyList.innerHTML = completed.map(req => {
                    let badgeClass = 'badge-approved';
                    let badgeText = 'Đã duyệt';
                    if (req.status === 'rejected') {
                        badgeClass = 'badge-rejected';
                        badgeText = 'Từ chối';
                    } else if (req.auto_approved) {
                        badgeClass = 'badge-auto';
                        badgeText = 'Tự duyệt';
                    }
                    
                    return `
                        <div class="history-card">
                            <div class="history-info">
                                <div class="history-cmd" title="${escapeHtml(req.command)}">$ ${escapeHtml(req.command)}</div>
                                <div class="history-time">${req.timestamp} (${escapeHtml(req.client)})</div>
                            </div>
                            <span class="badge ${badgeClass}">${badgeText}</span>
                        </div>
                    `;
                }).join('');
            }
        }

        // Approve or Reject action
        function decide(id, action) {
            const card = document.getElementById(`req-card-${id}`);
            if (card) {
                // Add soft fade out animation
                card.style.opacity = '0.5';
                card.style.pointerEvents = 'none';
            }

            fetch(`/api/${action}/${id}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        alert("Lỗi: " + data.error);
                        fetchRequests();
                    }
                })
                .catch(err => {
                    console.error("Error making decision:", err);
                    fetchRequests();
                });
        }

        // Settings actions
        function fetchSettings() {
            fetch('/api/settings')
                .then(res => res.json())
                .then(data => {
                    whitelist = data.auto_approve_list;
                    autoApproveEnabled = data.auto_approve_enabled;
                    
                    document.getElementById('autoApproveToggle').checked = autoApproveEnabled;
                    renderWhitelist();
                });
        }

        function renderWhitelist() {
            const tagsContainer = document.getElementById('whitelistTags');
            tagsContainer.innerHTML = whitelist.map((item, index) => `
                <div class="whitelist-tag">
                    <span>${escapeHtml(item)}</span>
                    <span class="tag-remove" onclick="removeWhitelistItem(${index})">&times;</span>
                </div>
            `).join('');
        }

        function updateSettings() {
            const enabled = document.getElementById('autoApproveToggle').checked;
            
            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    auto_approve_enabled: enabled,
                    auto_approve_list: whitelist
                })
            })
            .then(res => res.json())
            .then(data => {
                whitelist = data.settings.auto_approve_list;
                autoApproveEnabled = data.settings.auto_approve_enabled;
            });
        }

        function addWhitelistItem() {
            const input = document.getElementById('whitelistInput');
            const value = input.value.strip ? input.value.strip() : input.value.trim();
            
            if (value && !whitelist.includes(value)) {
                whitelist.push(value);
                input.value = '';
                renderWhitelist();
                updateSettings();
            }
        }

        function removeWhitelistItem(index) {
            whitelist.splice(index, 1);
            renderWhitelist();
            updateSettings();
        }

        // Helper to escape HTML tags to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
